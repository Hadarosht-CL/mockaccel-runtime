# SPDX-License-Identifier: Apache-2.0
#
# .gitlab-ci.yml
#
# Pipeline-as-code entry point. Every job's `script:` is a single call
# into ./scripts/<verb>.sh. Logic lives in scripts/, not this YAML.
#
# Step 3 scope: lint + build + test + cross-build + package wired.
# publish / deploy land in Step 4 (rules-based gating on tags/main).
#
# Features exercised so far:
# - default:, stages:, variables:, extends: (incl. list form)
# - needs: for DAG execution (jobs start as soon as deps finish)
# - parallel:matrix: for fan-out
# - artifacts: passing build output between jobs in the same pipeline
# - cache: persisting FetchContent downloads across pipeline runs

default:
  image: ubuntu:22.04
  interruptible: true

stages:
  - lint
  - build
  - test
  - cross-build
  - package
  - publish
  - deploy

variables:
  DEBIAN_FRONTEND: noninteractive
  GIT_DEPTH: "20"
  # Skip the Python bindings in CI for now; pybind11 + python3-dev
  # cost build time we do not yet need. Stage 5 will turn this back
  # on for the integration-test matrix.
  CMAKE_FLAGS: "-DMOCKACCEL_BUILD_PYTHON=OFF"
  SHFMT_VERSION: "v3.8.0"

# --- hidden job templates --------------------------------------------------

.install-shell-tools:
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends shellcheck curl ca-certificates
    - curl -fsSL -o /usr/local/bin/shfmt "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
    - chmod +x /usr/local/bin/shfmt
    - shellcheck --version
    - shfmt --version

.install-build-tools:
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends build-essential cmake ninja-build ca-certificates git
    - cmake --version
    - ninja --version
    - git --version

# Caches FetchContent downloads (e.g. nlohmann_json) across pipeline
# runs. Key is computed from CMakeLists.txt content so the cache
# invalidates automatically when dependency declarations change.
.cache-fetchcontent:
  cache:
    key:
      files:
        - CMakeLists.txt
    paths:
      - build/_deps/
    policy: pull-push

# --- jobs ------------------------------------------------------------------

lint:
  stage: lint
  extends: .install-shell-tools
  script:
    - ./scripts/lint.sh

build:
  stage: build
  extends:
    - .install-build-tools
    - .cache-fetchcontent
  script:
    - ./scripts/build.sh
  artifacts:
    name: "build-host-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/
    expire_in: 1 day
    when: on_success

# Test job fan-out via parallel:matrix. test.sh reads BUILD_TYPE and
# surfaces it in pytest's report header so each matrix cell is self-
# labelling in the log. We call ./scripts/bootstrap.sh here instead of
# extending .install-build-tools because the test job needs Python and
# a populated .venv/, which bootstrap.sh creates. This is also the
# first step toward retiring .install-build-tools duplication
# (Stage 6 carry-forward DRY note).
test:
  stage: test
  needs:
    - build
  parallel:
    matrix:
      - BUILD_TYPE: [Release, Debug]
  before_script:
    - ./scripts/bootstrap.sh
  script:
    - echo "BUILD_TYPE=${BUILD_TYPE}"
    - ./scripts/test.sh

# Cross-compile to ARM64. Stage 4 step 2 wired build.sh to a real
# cross-build, but the cross-compiler is not installed in the CI
# image yet; that lands in Stage 4 step 3. Until then this job is
# expected to fail and is marked allow_failure so main stays green.
# REMOVE allow_failure in the Stage 4 step 3 MR.
cross-build:
  stage: cross-build
  extends: .install-build-tools
  needs:
    - build
  allow_failure: true
  script:
    - ./scripts/build.sh --target=aarch64

# Package the host build into a release tarball. package.sh is a Stage 7
# stub today; the publish stage in Step 4 will push the resulting
# artifacts to Artifactory.
package:
  stage: package
  extends: .install-build-tools
  needs:
    - build
    - test
    - cross-build
  script:
    - ./scripts/package.sh

# Push artifacts to the registry. Runs on every main commit (dev repo)
# and on every v*.*.* tag (prod repo). publish.sh is a Stage 7 stub.
publish:
  stage: publish
  extends: .install-build-tools
  needs:
    - package
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - ./scripts/publish.sh

# Deploy to a Kubernetes target. Tag-only (only released versions are
# deployed). deploy.sh is a Stage 9 stub.
deploy:
  stage: deploy
  extends: .install-build-tools
  needs:
    - publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - ./scripts/deploy.sh

# Create a GitLab Release page on v*.*.* tags. Uses GitLab's release:
# keyword (handled by the release-cli image). Stage 10 will wire a
# real CHANGELOG via git-cliff; today the description is a placeholder.
release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "Creating GitLab Release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release ${CI_COMMIT_TAG}"
    description: "Automated release from tag ${CI_COMMIT_TAG}. Full CHANGELOG lands in Stage 10."
    ref: $CI_COMMIT_SHA
